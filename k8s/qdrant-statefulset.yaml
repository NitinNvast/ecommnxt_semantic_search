apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: xirify-dev-ns
spec:
  serviceName: qdrant-headless
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.9.1
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: xirify-dev-ns
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-headless
  namespace: xirify-dev-ns
spec:
  selector:
    app: qdrant
  clusterIP: None
  ports:
    - port: 6333
